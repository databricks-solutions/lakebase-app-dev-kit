# CI/CD on PR: create Lakebase branch ci-pr-<N> (N = PR number), build, run migrations, run tests.
# - Branch names stay in sync: one Lakebase branch per PR, named ci-pr-<PR_number>.
# - Language-aware: detects Java/Flyway, Python/Alembic, or Node.js/Knex from marker files.
# - On failure: post comment on PR to notify the committer (and GitHub shows failed check).
# - On success: post comment on PR and optionally notify tester queue via webhook (set TESTER_QUEUE_WEBHOOK_URL).
name: PR

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    runs-on: self-hosted
    outputs:
      ci_branch_used: ${{ steps.datasource.outputs.ci_branch_used }}
      schema_diff_b64: ${{ steps.schema-diff-export.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect project language
        id: detect-lang
        # Routes through the substrate's lakebase-detect-language CLI so
        # the kit's marker-file detection (mirrors lakebase-schema-migrate's auto-
        # detect) is the single source of truth across pr.yml + merge.yml +
        # the substrate's migrate runners. {{LAKEBASE_KIT_VERSION}} is
        # substituted at scaffold time to the kit version that produced
        # this project.
        run: |
          LANG="$(npx --yes \
            --package=github:databricks-solutions/lakebase-app-dev-kit#v{{LAKEBASE_KIT_VERSION}} \
            lakebase-detect-language)"
          echo "lang=$LANG" >> $GITHUB_OUTPUT
          echo "Detected language: $LANG"

      - name: Set up JDK
        if: steps.detect-lang.outputs.lang == 'java'
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set Java env vars
        if: steps.detect-lang.outputs.lang == 'java'
        run: echo "MAVEN_OPTS=--enable-native-access=ALL-UNNAMED" >> $GITHUB_ENV

      - name: Set up Python + uv
        if: steps.detect-lang.outputs.lang == 'python'
        run: |
          if command -v uv >/dev/null 2>&1; then
            echo "uv already on PATH"; uv --version
          elif command -v pip >/dev/null 2>&1; then
            pip install uv
          else
            curl -LsSf https://astral.sh/uv/install.sh | sh
            export PATH="$HOME/.local/bin:$PATH"
            echo "PATH=$HOME/.local/bin:$PATH" >> $GITHUB_ENV
          fi
          uv sync --all-extras

      - name: Set up Node.js
        if: steps.detect-lang.outputs.lang == 'nodejs'
        run: |
          if command -v node >/dev/null 2>&1; then
            echo "Node.js already on PATH"; node --version
          fi
          npm install

      # Install frontend dependencies when a `client/` workspace is present
      # (Python+React layouts etc.). Gated on client/package.json so projects
      # without a frontend skip this transparently.
      - name: Install client dependencies
        if: hashFiles('client/package.json') != ''
        working-directory: client
        run: |
          if command -v node >/dev/null 2>&1; then
            echo "Node.js already on PATH"; node --version
          fi
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # Build the client into client/dist BEFORE any test step. Tests that serve
      # the SPA (a Python/React app whose backend mounts client/dist, or Playwright
      # E2E that drives the real UI) need the built client present in CI, exactly
      # as it is when the build agent greened them locally , dev/CI environment
      # parity. `--if-present` makes this a transparent no-op when client has no
      # `build` script. Gated on client/package.json so non-frontend projects skip
      # it. Without this, a guarded backend (see the imports-clean gate) serves a
      # 503 "client not built" shell and every UI/E2E assertion fails.
      - name: Build client
        if: hashFiles('client/package.json') != ''
        working-directory: client
        run: npm run build --if-present

      # Run the client's unit tests (Vitest + Testing Library, jsdom) when a
      # client/ workspace is present. These need no database, so they run before
      # the CI branch is provisioned and fail fast. `--if-present` no-ops a
      # client with no `test` script. The client's Playwright E2E runs later
      # (its own step, gated on client/playwright.config.ts).
      - name: Run client unit tests
        if: hashFiles('client/package.json') != ''
        working-directory: client
        run: npm run test --if-present

      # The official action installs to a user-writable path (no sudo). It's
      # a no-op if a compatible databricks CLI is already on PATH.
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      # Creates Lakebase branch ci-pr-<N> forked from the PR's BASE git branch
      # (the natural parent for the PR). This handles both tiers correctly:
      #   - feature → staging PR: forks from staging (test feature deltas on staging)
      #   - staging → main PR: forks from main / default (test staging deltas on prod)
      # Two-tier safe. Delegates to scripts/ci/resolve-lakebase-branch.sh.
      - name: Create CI database branch (Lakebase)
        id: lakebase-db
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST || '' }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN || '' }}
          # Force PAT auth. Databricks CLI v1.0+ rejects pre-v1 file-cache
          # credentials on first call and won't fall back to DATABRICKS_TOKEN
          # automatically when a legacy ~/.databricks/ cache is present
          # (which it is on self-hosted runners that pre-date the v1 cutover).
          # `pat` pins auth to DATABRICKS_TOKEN and bypasses the cache.
          DATABRICKS_AUTH_TYPE: pat
          # Clear any runner-inherited CLI profile so AUTH_TYPE=pat is used cleanly
          # (a leaked DATABRICKS_CONFIG_PROFILE makes the CLI attempt OAuth resolution,
          # which hangs headless and times out the substrate's databricks calls).
          DATABRICKS_CONFIG_PROFILE: ""
          LAKEBASE_PROJECT_ID: ${{ secrets.LAKEBASE_PROJECT_ID || '' }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_REPO_FORK: ${{ github.event.pull_request.head.repo.fork }}
        run: |
          export DATABRICKS_HOST DATABRICKS_TOKEN DATABRICKS_AUTH_TYPE
          PR="${{ github.event.pull_request.number }}"
          CI_BRANCH_NAME="ci-pr-${PR}"
          echo "branch=${CI_BRANCH_NAME}" >> $GITHUB_OUTPUT

          write_skip() {
            echo "## Lakebase CI branch: not created" >> $GITHUB_STEP_SUMMARY
            echo "$1" >> $GITHUB_STEP_SUMMARY
            echo "url=" >> $GITHUB_OUTPUT
            echo "username=" >> $GITHUB_OUTPUT
            echo "password=" >> $GITHUB_OUTPUT
          }

          echo "Lakebase CI branch setup:"
          echo "  PR base.ref (CI fork parent): ${PR_BASE_REF}"
          echo "  CI branch: ${CI_BRANCH_NAME}"
          echo "  PR from fork: ${PR_HEAD_REPO_FORK}"
          echo "  DATABRICKS_HOST: $([ -n "$DATABRICKS_HOST" ] && echo 'set' || echo 'NOT SET')"
          echo "  DATABRICKS_TOKEN: $([ -n "$DATABRICKS_TOKEN" ] && echo 'set' || echo 'NOT SET')"
          echo "  LAKEBASE_PROJECT_ID: $([ -n "$LAKEBASE_PROJECT_ID" ] && echo 'set' || echo 'NOT SET')"

          # Preflight – bail cleanly with an actionable summary if we can't proceed
          if [ "$PR_HEAD_REPO_FORK" = "true" ]; then
            write_skip "**Reason:** PR is from a fork. GitHub does not pass repo secrets to fork PRs. **Fix:** Push your branch to this repo and open the PR from here."
            exit 0
          fi
          if ! command -v databricks >/dev/null 2>&1 || ! command -v jq >/dev/null 2>&1; then
            write_skip "**Reason:** \`databricks\` CLI or \`jq\` not found on runner."
            exit 0
          fi
          if [ -z "$LAKEBASE_PROJECT_ID" ] || [ -z "$DATABRICKS_HOST" ] || [ -z "$DATABRICKS_TOKEN" ]; then
            write_skip "**Reason:** Missing secrets (DATABRICKS_HOST, DATABRICKS_TOKEN, LAKEBASE_PROJECT_ID). **Fix:** Add them in repo Settings → Secrets."
            exit 0
          fi
          # Capture stderr so the actual failure reason (expired token,
          # incompatible credential cache, network error, etc.) reaches the
          # job summary instead of being swallowed by 2>/dev/null.
          AUTH_ERR="$(databricks current-user me -o json 2>&1 >/dev/null || true)"
          if [ -n "$AUTH_ERR" ]; then
            write_skip "**Reason:** Databricks authentication failed.\\n\\n\`\`\`\\n${AUTH_ERR}\\n\`\`\`"
            echo "::error::Databricks auth failed: ${AUTH_ERR}"
            exit 0
          fi
          if [ -z "$PR_BASE_REF" ]; then
            write_skip "**Reason:** Could not determine PR base.ref (parent branch). The workflow must be triggered by a pull_request event."
            exit 0
          fi

          # Resolve + create the CI branch forked from the PR's base.ref.
          # --lakebase-name pins the name to ci-pr-<N> (skip the git→name mapping).
          # --create-from <PR_BASE_REF> forks from the parent branch's Lakebase clone.
          # --recreate-on-source-mismatch: if ci-pr-N already exists but was
          # forked from a different parent (e.g. a prior run when base.ref was
          # main, but now base.ref is staging), delete + re-fork from the
          # correct parent. CI branches are disposable so this is always safe.
          # --ensure-endpoint creates the primary endpoint if it doesn't exist.
          #
          # --github-env writes tokens/DATABASE_URL to $GITHUB_ENV (visible to
          # subsequent steps) AND prints non-secret key='value' lines to stdout
          # (captured + evaled below so they're visible IN THIS STEP too –
          # $GITHUB_ENV writes don't take effect until the next step).
          if ! HELPER_OUT="$(./scripts/ci/resolve-lakebase-branch.sh \
                --lakebase-name "$CI_BRANCH_NAME" \
                --create-from "$PR_BASE_REF" \
                --recreate-on-source-mismatch \
                --ensure-endpoint \
                --github-env)"; then
            write_skip "**Reason:** Could not create CI branch \`$CI_BRANCH_NAME\` forked from \`$PR_BASE_REF\`. Check the workflow log above."
            exit 0
          fi
          eval "$HELPER_OUT"

          # JDBC_URL, LAKEBASE_BRANCH_STATUS, LAKEBASE_BRANCH_SOURCE,
          # LAKEBASE_USERNAME are now set in this shell. Mirror the critical
          # ones to step outputs for downstream jobs + conditional steps.
          # (Secrets stay in $GITHUB_ENV – downstream steps read them via
          # env.DB_PASSWORD rather than step outputs.)
          echo "url=${JDBC_URL}" >> $GITHUB_OUTPUT
          echo "username=${LAKEBASE_USERNAME}" >> $GITHUB_OUTPUT

          # Translate LAKEBASE_BRANCH_STATUS into a truthful one-line log +
          # summary table row. Never claim "forked from X" unless we actually
          # forked (or verified the existing fork points at X).
          case "$LAKEBASE_BRANCH_STATUS" in
            CREATED)    ACTION="newly created, forked from Lakebase '$LAKEBASE_BRANCH_SOURCE' pair of git '$PR_BASE_REF'" ;;
            RECREATED)  ACTION="existed with wrong source – deleted and re-forked from Lakebase '$LAKEBASE_BRANCH_SOURCE' pair of git '$PR_BASE_REF'" ;;
            VERIFIED)   ACTION="already existed, source '$LAKEBASE_BRANCH_SOURCE' matches parent – reused" ;;
            UNVERIFIED) ACTION="already existed but API did not report a source_branch – reused without verification" ;;
            *)          ACTION="status=$LAKEBASE_BRANCH_STATUS (source=$LAKEBASE_BRANCH_SOURCE)" ;;
          esac
          echo "Lakebase: CI branch $CI_BRANCH_NAME ready – ${ACTION}."
          {
            echo "## Lakebase CI branch: $LAKEBASE_BRANCH_STATUS"
            echo "| | |"
            echo "|--|--|"
            echo "| Branch | \`$CI_BRANCH_NAME\` |"
            echo "| Status | \`$LAKEBASE_BRANCH_STATUS\` |"
            echo "| Actual source | \`${LAKEBASE_BRANCH_SOURCE:-unknown}\` |"
            echo "| PR base.ref (expected parent) | \`$PR_BASE_REF\` |"
          } >> $GITHUB_STEP_SUMMARY

      - name: Configure datasource for CI
        id: datasource
        run: |
          # DATABASE_URL, DB_USERNAME, DB_PASSWORD, SPRING_DATASOURCE_* were
          # already written to $GITHUB_ENV by resolve-lakebase-branch.sh in the
          # previous step. Nothing to mirror here. This step exists only to
          # emit `ci_branch_used` for the pr-comment job's condition.
          if [ -n "${{ steps.lakebase-db.outputs.url }}" ]; then
            echo "ci_branch_used=true" >> $GITHUB_OUTPUT
            echo "Using CI branch URL"
          else
            echo "ci_branch_used=false" >> $GITHUB_OUTPUT
            echo "No CI branch URL; tests may use default or fail."
          fi

      - name: Comment on PR (no Lakebase branch)
        if: steps.lakebase-db.outputs.url == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY="⚠️ **No Lakebase CI branch** was created. This run is not using a dedicated database branch. Open the [workflow run](${RUN_URL}), expand **Create CI database branch (Lakebase)** and check the step **Summary** (or log) for the reason and how to fix it."
          gh pr comment "$PR" --body "$BODY" 2>/dev/null || true

      # Install Flyway CLI for Java/Kotlin projects only. The substrate's
      # migrate runner spawns the standalone `flyway` binary; non-Java
      # projects don't need it. Runtime-gated on pom.xml so the YAML is
      # one shape for every language.
      #
      # Resolution order:
      #   1. `flyway` already on PATH (self-hosted runner with brew /
      #      apt install): use it, skip download.
      #   2. $FLYWAY_DOWNLOAD_BASE_URL env override (runners behind a
      #      Maven-proxy mirror that block repo1.maven.org). Wire via
      #      repo Variables → vars.FLYWAY_DOWNLOAD_BASE_URL.
      #   3. Default https://repo1.maven.org/maven2 for GitHub-hosted
      #      runners with public internet.
      - name: Install Flyway CLI
        if: steps.lakebase-db.outputs.url != '' && hashFiles('pom.xml') != ''
        env:
          FLYWAY_DOWNLOAD_BASE_URL: ${{ vars.FLYWAY_DOWNLOAD_BASE_URL }}
        run: |
          if command -v flyway >/dev/null 2>&1; then
            echo "Flyway already on PATH ($(command -v flyway)); skipping download."
            flyway --version 2>&1 | head -1 || true
            exit 0
          fi
          FLYWAY_VERSION=10.20.1
          FLYWAY_BASE="${FLYWAY_DOWNLOAD_BASE_URL:-https://repo1.maven.org/maven2}"
          DEST="$RUNNER_TEMP/flyway"
          mkdir -p "$DEST"
          echo "Downloading Flyway $FLYWAY_VERSION from $FLYWAY_BASE ..."
          curl --fail --silent --location \
            "$FLYWAY_BASE/org/flywaydb/flyway-commandline/$FLYWAY_VERSION/flyway-commandline-$FLYWAY_VERSION.zip" \
            -o "$DEST/flyway.zip"
          unzip -q "$DEST/flyway.zip" -d "$DEST"
          rm -f "$DEST/flyway.zip"
          echo "$DEST/flyway-$FLYWAY_VERSION" >> $GITHUB_PATH

      - name: Run migrations (CI branch)
        id: migrate-ci
        if: steps.lakebase-db.outputs.url != ''
        env:
          # Pull auth from secrets directly. The substrate's lakebase-schema-migrate
          # CLI spawns `databricks postgres list-endpoints` under the hood,
          # which on Databricks CLI v1+ refuses to read the pre-v1 ~/.databricks/
          # credential cache and won't fall back to DATABRICKS_TOKEN unless
          # DATABRICKS_AUTH_TYPE=pat pins it. Same pattern as the other auth-
          # requiring steps in this workflow ("Run E2E tests", "Schema diff").
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_AUTH_TYPE: pat
          # Clear any runner-inherited CLI profile so AUTH_TYPE=pat is used cleanly
          # (a leaked DATABRICKS_CONFIG_PROFILE makes the CLI attempt OAuth resolution,
          # which hangs headless and times out the substrate's databricks calls).
          DATABRICKS_CONFIG_PROFILE: ""
          LAKEBASE_PROJECT_ID: ${{ secrets.LAKEBASE_PROJECT_ID }}
        run: |
          if [ -z "$LAKEBASE_BRANCH_NAME" ]; then
            echo "::error::LAKEBASE_BRANCH_NAME not set; the resolve-credentials step should have populated it."
            exit 1
          fi
          echo "Routing migrations through the substrate's lakebase-schema-migrate CLI"
          echo "  kit version: {{LAKEBASE_KIT_VERSION}}"
          echo "  instance:    $LAKEBASE_PROJECT_ID"
          echo "  branch:      $LAKEBASE_BRANCH_NAME"
          npx --yes --package=github:databricks-solutions/lakebase-app-dev-kit#v{{LAKEBASE_KIT_VERSION}} \
            lakebase-schema-migrate apply \
            --instance "$LAKEBASE_PROJECT_ID" \
            --branch "$LAKEBASE_BRANCH_NAME" \
            --pretty
          echo "Migrations completed."

      - name: Run tests
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DB_USERNAME: ${{ env.DB_USERNAME }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
          SPRING_DATASOURCE_URL: ${{ env.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ env.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ env.SPRING_DATASOURCE_PASSWORD }}
        run: |
          LANG="${{ steps.detect-lang.outputs.lang }}"
          if [ -n "$DATABASE_URL" ]; then
            echo "Running tests against CI branch."
            if [ "$LANG" = "java" ]; then
              ./mvnw -q test -Dspring.datasource.url="$SPRING_DATASOURCE_URL" -Dspring.datasource.username="${SPRING_DATASOURCE_USERNAME:-}" -Dspring.datasource.password="${SPRING_DATASOURCE_PASSWORD:-}"
            elif [ "$LANG" = "python" ]; then
              uv run pytest
            elif [ "$LANG" = "nodejs" ]; then
              npm test
            fi
          else
            echo "::error::No CI branch URL – cannot run tests without a database. Check the 'Create CI database branch' step for details."
            exit 1
          fi

      # Playwright E2E tests run against the Vite dev server + backend.
      # Only fires if a playwright config is checked in under client/, so
      # projects without a browser loop skip these transparently. The
      # schema-diff step that follows runs unconditionally.
      #
      # Note: the project's client/playwright.config.ts MUST boot BOTH the
      # frontend (Vite/5173) AND the backend (uvicorn/8000 etc.) via the
      # `webServer: []` array. A config that only starts Vite will hit
      # `ECONNREFUSED` on every /api/* call. See
      # templates/project/common/client-reference/playwright.config.ts for
      # a full-stack reference.
      # Resiliency: a self-hosted runner can leave a stale uvicorn/vite from a
      # prior run holding :8000 / :5173, which makes the client Playwright
      # webServer (reuseExistingServer:false in CI) hard-fail with
      # "http://localhost:8000/health is already used". Mirror run-dev.sh's port
      # safeguard: probe upward for FREE ports (scripts/port-utils.sh) and hand
      # them to the config via E2E_BACKEND_PORT / E2E_CLIENT_PORT (multi-tenant
      # safe , we MOVE off a busy port, never kill it). $GITHUB_ENV propagates
      # them to the Playwright step below. A retrofit project without the shared
      # helper falls back to the conventional defaults.
      - name: Allocate free E2E ports
        if: hashFiles('client/playwright.config.ts', 'client/playwright.config.js', 'client/playwright.config.mjs') != ''
        run: |
          if [ -f scripts/port-utils.sh ]; then
            # shellcheck source=/dev/null
            source scripts/port-utils.sh
            BACKEND_PORT="$(free_port 8000)"
            CLIENT_PORT="$(free_port 5173)"
          else
            BACKEND_PORT=8000
            CLIENT_PORT=5173
          fi
          echo "E2E_BACKEND_PORT=$BACKEND_PORT" >> $GITHUB_ENV
          echo "E2E_CLIENT_PORT=$CLIENT_PORT" >> $GITHUB_ENV
          echo "E2E ports: backend=$BACKEND_PORT client=$CLIENT_PORT"

      - name: Install Playwright browsers
        if: hashFiles('client/playwright.config.ts', 'client/playwright.config.js', 'client/playwright.config.mjs') != ''
        working-directory: client
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (Playwright)
        if: hashFiles('client/playwright.config.ts', 'client/playwright.config.js', 'client/playwright.config.mjs') != ''
        working-directory: client
        env:
          # Backend booted by playwright's webServer uses these for SDK auth.
          # Without them, the Python SDK's default auth chain falls through to
          # the self-hosted runner's ~/.databrickscfg, which usually has an
          # expired OAuth refresh token and surfaces as `refresh token is
          # invalid` warnings at request time.
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_AUTH_TYPE: pat
          # Clear any runner-inherited CLI profile so AUTH_TYPE=pat is used cleanly
          # (a leaked DATABRICKS_CONFIG_PROFILE makes the CLI attempt OAuth resolution,
          # which hangs headless and times out the substrate's databricks calls).
          DATABRICKS_CONFIG_PROFILE: ""
        run: npx playwright test

      # Phase 2: project-root Playwright wire-up (separate from
      # the client/ workspace path above). Scaffolded by `lakebase-create-project
      # --enable-e2e` for [E2E]-tagged AC rows. Runs Playwright at the
      # project root and points BASE_URL at the CI branch's deployed app
      # endpoint when available; the project's playwright.config.ts is
      # responsible for booting a local server via webServer when BASE_URL
      # is not set.
      #
      # resolve the deployed CI app URL via the kit's
      # lakebase-ci-app-endpoint CLI and export LAKEBASE_APP_ENDPOINT
      # to $GITHUB_ENV when the app exists. The CLI exits 0 with empty
      # stdout when the app does not exist (e.g. no CI-deploy step has
      # been wired into the project, or the deploy step was skipped due
      # to missing secrets); we keep LAKEBASE_APP_ENDPOINT unset in that
      # case so the project-root Playwright step falls back to its
      # playwright.config.ts webServer block.
      - name: Resolve CI app endpoint
        if: hashFiles('playwright.config.ts', 'playwright.config.js', 'playwright.config.mjs') != '' && steps.lakebase-db.outputs.url != ''
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_AUTH_TYPE: pat
          # Clear any runner-inherited CLI profile so AUTH_TYPE=pat is used cleanly
          # (a leaked DATABRICKS_CONFIG_PROFILE makes the CLI attempt OAuth resolution,
          # which hangs headless and times out the substrate's databricks calls).
          DATABRICKS_CONFIG_PROFILE: ""
          LAKEBASE_PROJECT_ID: ${{ secrets.LAKEBASE_PROJECT_ID }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          CI_BRANCH="ci-pr-${PR}"
          # Capture stdout only; the CLI prints a "does not exist" note
          # to stderr which we want visible in the log but NOT in the
          # exported URL value. On any infra error the CLI exits 1; the
          # `|| URL=""` clause keeps the workflow green and the env var
          # unset so the downstream Playwright step degrades cleanly.
          URL="$(npx --yes \
            --package=github:databricks-solutions/lakebase-app-dev-kit#v{{LAKEBASE_KIT_VERSION}} \
            lakebase-ci-app-endpoint \
            --instance "$LAKEBASE_PROJECT_ID" \
            --branch "$CI_BRANCH")" || URL=""
          if [ -n "$URL" ]; then
            echo "LAKEBASE_APP_ENDPOINT=$URL" >> $GITHUB_ENV
            echo "Resolved CI app endpoint: $URL"
          else
            echo "No CI app endpoint resolved; project-root E2E will use the playwright.config.ts webServer fallback."
          fi

      - name: Install Playwright browsers (project root)
        if: hashFiles('playwright.config.ts', 'playwright.config.js', 'playwright.config.mjs') != ''
        run: npx --yes playwright install --with-deps chromium

      - name: Run E2E tests (Playwright, project root)
        if: hashFiles('playwright.config.ts', 'playwright.config.js', 'playwright.config.mjs') != ''
        env:
          # Honor a paired-branch app endpoint when an earlier step exported
          # one to $GITHUB_ENV (LAKEBASE_APP_ENDPOINT). Otherwise the
          # project's playwright.config.ts decides (defaults to
          # http://localhost:3000 in the kit template).
          BASE_URL: ${{ env.LAKEBASE_APP_ENDPOINT }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_AUTH_TYPE: pat
          # Clear any runner-inherited CLI profile so AUTH_TYPE=pat is used cleanly
          # (a leaked DATABRICKS_CONFIG_PROFILE makes the CLI attempt OAuth resolution,
          # which hangs headless and times out the substrate's databricks calls).
          DATABRICKS_CONFIG_PROFILE: ""
        run: |
          if [ -f package.json ] && command -v npm >/dev/null 2>&1; then
            npm run test:e2e
          else
            npx --yes playwright test
          fi

      - name: Schema diff (CI branch vs parent)
        if: success() && steps.datasource.outputs.ci_branch_used == 'true'
        id: schema-diff
        env:
          CI_JDBC_URL: ${{ steps.lakebase-db.outputs.url }}
          CI_DB_USERNAME: ${{ env.DB_USERNAME }}
          CI_DB_PASSWORD: ${{ env.DB_PASSWORD }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST || '' }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN || '' }}
          DATABRICKS_AUTH_TYPE: pat
          # Clear any runner-inherited CLI profile so AUTH_TYPE=pat is used cleanly
          # (a leaked DATABRICKS_CONFIG_PROFILE makes the CLI attempt OAuth resolution,
          # which hangs headless and times out the substrate's databricks calls).
          DATABRICKS_CONFIG_PROFILE: ""
          LAKEBASE_PROJECT_ID: ${{ secrets.LAKEBASE_PROJECT_ID || '' }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -e
          PR="${{ github.event.pull_request.number }}"
          BRANCH="ci-pr-${PR}"
          MD="schema-diff.md"
          echo "## Schema (Lakebase branch \`${BRANCH}\`, forked from \`${PR_BASE_REF}\`)" > "$MD"
          echo "" >> "$MD"
          # Migrations applied on CI branch (from repo)
          LANG="${{ steps.detect-lang.outputs.lang }}"
          echo "### Migrations applied on this branch (CI)" >> "$MD"
          echo "| Version | Migration |" >> "$MD"
          echo "|---------|-----------|" >> "$MD"
          if [ "$LANG" = "java" ]; then
            for f in src/main/resources/db/migration/*.sql; do
              [ -f "$f" ] || continue
              base=$(basename "$f")
              ver=$(echo "$base" | sed -n 's/^V\([0-9]*\)__.*/\1/p')
              desc=$(echo "$base" | sed -n 's/^V[0-9]*__\(.*\)\.sql$/\1/p' | tr '_' ' ')
              [ -n "$ver" ] && echo "| V$ver | $desc |" >> "$MD"
            done
          elif [ "$LANG" = "python" ]; then
            for f in alembic/versions/*.py; do
              [ -f "$f" ] || continue
              base=$(basename "$f")
              rev=$(echo "$base" | cut -d_ -f1)
              desc=$(echo "$base" | sed 's/^[^_]*_//' | sed 's/\.py$//' | tr '_' ' ')
              [ -n "$rev" ] && echo "| $rev | $desc |" >> "$MD"
            done
          elif [ "$LANG" = "nodejs" ]; then
            for f in migrations/*.js; do
              [ -f "$f" ] || continue
              base=$(basename "$f")
              ver=$(echo "$base" | sed -n 's/^\([0-9]*\)_.*/\1/p')
              desc=$(echo "$base" | sed 's/^[0-9]*_//' | sed 's/\.js$//' | tr '_' ' ')
              [ -n "$ver" ] && echo "| $ver | $desc |" >> "$MD"
            done
          fi
          echo "" >> "$MD"
          # Obtain PARENT branch URL via the helper. PARENT = PR's base.ref (e.g.
          # 'staging' for feature→staging PRs; 'main' for staging→main PRs).
          # Schema diff compares CI branch against the parent's current schema so
          # reviewers see only what this PR adds relative to where it'll merge.
          PRODUCTION_DATASOURCE_URL=""
          PRODUCTION_DATASOURCE_USERNAME=""
          PRODUCTION_DATASOURCE_PASSWORD=""
          if [ -n "$LAKEBASE_PROJECT_ID" ] && [ -n "$DATABRICKS_HOST" ] && [ -n "$DATABRICKS_TOKEN" ] && [ -n "$PR_BASE_REF" ]; then
            PARENT_ENV="$(./scripts/ci/resolve-lakebase-branch.sh --git-branch "$PR_BASE_REF" 2>/dev/null || true)"
            if [ -n "$PARENT_ENV" ]; then
              eval "$PARENT_ENV"
              PRODUCTION_DATASOURCE_URL="$JDBC_URL"
              PRODUCTION_DATASOURCE_USERNAME="$LAKEBASE_USERNAME"
              PRODUCTION_DATASOURCE_PASSWORD="$LAKEBASE_PASSWORD"
              unset LAKEBASE_BRANCH_NAME LAKEBASE_BRANCH_PATH LAKEBASE_HOST \
                    LAKEBASE_USERNAME LAKEBASE_PASSWORD DATABASE_URL JDBC_URL
            fi
          fi
          # Schema diff: substrate-only via lakebase-schema-diff --format markdown.
          # The TS substrate queries information_schema directly on both Lakebase
          # branches (target = CI ci-pr-N, parent = PR_BASE_REF), so no pg_dump or
          # format-schema-diff.sh is needed.
          # Target Lakebase branch = the CI branch ci-pr-N ($BRANCH). LAKEBASE_BRANCH_NAME
          # is intentionally unset above (it was eval'd to the PARENT during parent-
          # credential resolution, then cleared), so gate on $BRANCH and pass it as
          # --branch. Resolve the kit via the GitHub ref (it is NOT published to npm;
          # the @org@version registry form 404s).
          if [ -n "$PRODUCTION_DATASOURCE_URL" ] && [ -n "$BRANCH" ]; then
            echo "### Schema diff: \`${BRANCH}\` vs parent (\`${PR_BASE_REF}\`)" >> "$MD"
            echo "" >> "$MD"
            if ! npx --yes --package=github:databricks-solutions/lakebase-app-dev-kit#v{{LAKEBASE_KIT_VERSION}} \
                 lakebase-schema-diff \
                 --instance "$LAKEBASE_PROJECT_ID" \
                 --branch "$BRANCH" \
                 --against "$PR_BASE_REF" \
                 --format markdown >> "$MD" 2>>"$MD.err"; then
              echo "" >> "$MD"
              echo "Schema diff via substrate failed:" >> "$MD"
              [ -s "$MD.err" ] && sed 's/^/  > /' "$MD.err" >> "$MD"
            fi
            rm -f "$MD.err"
          else
            echo "### Schema diff vs parent \`${PR_BASE_REF}\`" >> "$MD"
            echo "Parent branch URL could not be resolved from Lakebase. Check that the Lakebase branch paired with git \`${PR_BASE_REF}\` exists, and that \`LAKEBASE_PROJECT_ID\`, \`DATABRICKS_HOST\`, \`DATABRICKS_TOKEN\` are set." >> "$MD"
          fi
          cat "$MD" >> $GITHUB_STEP_SUMMARY
          echo "path=$MD" >> $GITHUB_OUTPUT

      # Pass schema diff via job output (no artifact upload – avoids storage quota)
      - name: Export schema diff to output
        id: schema-diff-export
        if: success() && steps.datasource.outputs.ci_branch_used == 'true' && steps.schema-diff.outcome == 'success'
        run: |
          echo "content<<SCHEMA_DIFF_EOF" >> $GITHUB_OUTPUT
          base64 < schema-diff.md >> $GITHUB_OUTPUT
          echo "SCHEMA_DIFF_EOF" >> $GITHUB_OUTPUT

  pr-comment:
    runs-on: self-hosted
    needs: build-and-test
    if: success() && needs.build-and-test.result == 'success' && needs.build-and-test.outputs.ci_branch_used == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Restore schema diff
        if: needs.build-and-test.outputs.schema_diff_b64 != ''
        env:
          SCHEMA_DIFF_B64: ${{ needs.build-and-test.outputs.schema_diff_b64 }}
        run: echo "$SCHEMA_DIFF_B64" | (base64 -d 2>/dev/null || base64 -D) > schema-diff.md
      - name: Comment on PR (success – ready for test)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          SCHEMA_FILE="schema-diff.md"
          [ -f "schema-diff/schema-diff.md" ] && SCHEMA_FILE="schema-diff/schema-diff.md"
          {
            echo '✅ **CI passed.** Build and tests succeeded on Lakebase branch `ci-pr-'"$PR"'`. Ready for QA.'
            if [ -f "$SCHEMA_FILE" ]; then
              echo ''
              echo '---'
              cat "$SCHEMA_FILE"
            fi
          } > comment-body.md
          gh pr comment "$PR" --body-file comment-body.md 2>/dev/null || true
      - name: Notify tester queue (webhook)
        env:
          # Repository secret; linter may warn "Context access might be invalid" (false positive)
          TESTER_QUEUE_WEBHOOK_URL: ${{ secrets.TESTER_QUEUE_WEBHOOK_URL || '' }}
        run: |
          if [ -z "$TESTER_QUEUE_WEBHOOK_URL" ]; then exit 0; fi
          PR="${{ github.event.pull_request.number }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST -H "Content-Type: application/json" \
            -d "{\"pr\":$PR,\"status\":\"success\",\"lakebase_branch\":\"ci-pr-$PR\",\"message\":\"Build and tests passed. Ready for QA.\",\"run_url\":\"$RUN_URL\",\"head_ref\":\"${{ github.head_ref }}\"}" \
            "$TESTER_QUEUE_WEBHOOK_URL" || true

  notify-committer-on-failure:
    runs-on: self-hosted
    needs: build-and-test
    if: failure() && needs.build-and-test.result == 'failure'
    steps:
      - uses: actions/checkout@v4
      - name: Comment on PR (notify committer – build or tests failed)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY="❌ **CI failed.** Build or tests failed on this PR. Please check the [workflow run](${RUN_URL}) and fix the failures."
          gh pr comment "$PR" --body "$BODY" 2>/dev/null || true
