# Deploy targets for the /deploy phase.
#
# Each target carries a `type` discriminator. Only `local` is implemented today
# (run the app on this machine and verify it is reachable); remote types
# (databricks-app, vercel) are declared here but deferred, lakebase-tdd-deploy
# exits cleanly with "unsupported target type" until they land.
#
# /deploy <feature-id> --target local        (the orchestrated deploy phase)
# Local is the per-sprint "working software" target: it starts the app and
# polls base_url+health_path until it answers, so each iteration ends as
# running, reachable software.
targets:
  local:
    type: local
    # Command that starts the app in the foreground (backgrounded by the
    # deploy primitive). The Python scaffold serves uvicorn on :8000.
    run: make run
    base_url: http://localhost:8000
    # Any HTTP response on this path means the server is up (200 not required).
    health_path: /
    ready_timeout_seconds: 60

  # Remote target (Databricks Apps). Declared for the type discriminator;
  # NOT yet implemented by /deploy. Deploy via the extension / app-deploy skill.
  prod:
    type: databricks-app
    workspace_profile: your-profile-name
    workspace_path: /Workspace/Users/you@databricks.com/{{PROJECT_NAME}}
    app_name: {{PROJECT_NAME}}
    lakebase_project: {{PROJECT_NAME}}
    lakebase_branch: production
