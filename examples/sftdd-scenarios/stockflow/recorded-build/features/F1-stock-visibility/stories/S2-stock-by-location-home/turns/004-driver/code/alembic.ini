[alembic]
script_location = alembic
# Put the project root on sys.path for EVERY alembic subcommand (not just the
# ones that run env.py), so a data migration that imports app code loads under
# `alembic history` / `heads` too, not only under `upgrade`.
prepend_sys_path = .
# sqlalchemy.url is set programmatically in alembic/env.py from DATABASE_URL env var

# Logging config. Required by env.py's fileConfig() call. Without these
# sections fileConfig() raises KeyError: 'formatters' on every migration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
